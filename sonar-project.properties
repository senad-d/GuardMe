sonar.projectKey=senad-d_GuardMe
sonar.organization=senad-d

# Keep analysis focused on source assets while still scanning helper scripts and workflows.
sonar.sources=src,scripts,.github/workflows
sonar.tests=test
sonar.test.inclusions=test/**/*.test.mjs,test/e2e/**/*.mjs,test/e2e/**/*.ts

# `npm run coverage` writes this before the SonarQube GitHub Action runs.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=scripts/**,.github/**

sonar.sourceEncoding=UTF-8
